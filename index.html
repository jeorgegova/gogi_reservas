    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es GoGi Reservas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GoGi Reservas es una plataforma web colombiana de gestión de reservas y agenda online que permite a negocios como barberías, salones de belleza, clínicas, centros deportivos, coworkings y conjuntos residenciales automatizar la toma de citas, reducir ausencias con recordatorios automáticos y administrar sus operaciones desde un panel centralizado."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta GoGi Reservas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ofrecemos cuatro planes: Plan Gratuito ($0), Plan Emprendedor ($49.000/mes), Plan Profesional ($99.000/mes) y Plan Corporativo ($189.000/mes). Todos incluyen funcionalidades básicas de gestión de reservas y agenda online."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo funcionan los recordatorios automáticos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cuando un cliente agenda una cita, GoGi Reservas envía automáticamente recordatorios por correo electrónico en todos los planes, y por WhatsApp en los planes Profesional y Corporativo. Esto reduce las inasistencias hasta en un 90%."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué tipo de negocios pueden usar GoGi Reservas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GoGi Reservas está diseñado para barberías, salones de belleza, spas, clínicas, consultorios, centros deportivos, gimnasios, conjuntos residenciales, salas de ensayo, coworkings, oficinas y cualquier negocio que requiera gestión de turnos o reservas en línea."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo probar GoGi Reservas gratis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, ofrecemos un Plan Gratuito sin costo con hasta 5 reservas diarias, 1 sede y recordatorios por correo. No requiere tarjeta de crédito."
          }
        }
      ]
    }
    </script>
